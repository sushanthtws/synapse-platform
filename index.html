<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse — Skill Intelligence</title>

<style>
body { font-family: sans-serif; margin:0; background:#f6f8fa; }

.header {
    background:white;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
}

.hero {
    background:#0f2a52;
    color:white;
    padding:20px;
}

.search-bar {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}

.filters {
    background:white;
    padding:15px;
    border-bottom:1px solid #ddd;
}

.filter-group {
    margin-bottom:10px;
}

.filter-title {
    font-size:12px;
    font-weight:700;
    margin-bottom:6px;
    color:#555;
}

.chip {
    display:inline-block;
    padding:5px 10px;
    border:1px solid #ddd;
    border-radius:20px;
    margin:3px;
    cursor:pointer;
    font-size:12px;
}

.chip.active {
    background:#0969da;
    color:white;
}

.grid {
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:16px;
}

.card {
    background:white;
    padding:15px;
    border-radius:8px;
    border:1px solid #ddd;
}

.title { color:#0969da; font-weight:600; }
.summary { font-size:13px; color:#555; }

.meta { font-size:11px; color:#666; margin-top:6px; }

</style>
</head>

<body>

<div class="header">
    <div>⚡ Synapse</div>
    <div>
        <input type="file" id="file" style="display:none">
        <button onclick="file.click()">+ Upload</button>
    </div>
</div>

<div class="hero">
    <h2>Skill Intelligence</h2>
    <input id="search" class="search-bar" placeholder="Search skills (e.g. 'optimize API latency with python')">
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<script>

const API = "https://synapse-platform.onrender.com";

let ALL = [];
let ACTIVE = {
    domain: new Set(),
    usage: new Set(),
    tools: new Set(),
    languages: new Set(),
    tech_stack: new Set(),
    difficulty: new Set()
};

/* ---------------- LOAD ---------------- */
async function load() {
    const res = await fetch(`${API}/skills`);
    ALL = await res.json();
    buildFilters();
    render();
}

/* ---------------- BUILD FILTER GROUPS ---------------- */
function buildFilters() {

    const buckets = {
        domain: new Set(),
        usage: new Set(),
        tools: new Set(),
        languages: new Set(),
        tech_stack: new Set(),
        difficulty: new Set()
    };

    ALL.forEach(s => {
        if (s.domain) buckets.domain.add(s.domain);
        if (s.usage) buckets.usage.add(s.usage);
        if (s.difficulty) buckets.difficulty.add(s.difficulty);

        (s.tools || []).forEach(v => buckets.tools.add(v));
        (s.languages || []).forEach(v => buckets.languages.add(v));
        (s.tech_stack || []).forEach(v => buckets.tech_stack.add(v));
    });

    const container = document.getElementById("filters");

    container.innerHTML = Object.keys(buckets).map(group => `
        <div class="filter-group">
            <div class="filter-title">${group.toUpperCase()}</div>
            ${
                [...buckets[group]].map(v =>
                    `<span class="chip" onclick="toggle('${group}','${v}',this)">${v}</span>`
                ).join("")
            }
        </div>
    `).join("");
}

/* ---------------- TOGGLE ---------------- */
function toggle(group, value, el) {

    const set = ACTIVE[group];

    if (set.has(value)) {
        set.delete(value);
        el.classList.remove("active");
    } else {
        set.add(value);
        el.classList.add("active");
    }

    render();
}

/* ---------------- NLP SEARCH ---------------- */
function score(skill, query) {

    if (!query) return 1;

    const q = query.toLowerCase().split(" ");

    let text = `
        ${skill.title}
        ${skill.summary}
        ${(skill.tags || []).join(" ")}
        ${(skill.tools || []).join(" ")}
        ${(skill.languages || []).join(" ")}
        ${(skill.tech_stack || []).join(" ")}
        ${skill.domain}
        ${skill.usage}
    `.toLowerCase();

    let score = 0;

    q.forEach(word => {
        if (skill.title.toLowerCase().includes(word)) score += 5;
        if (skill.summary.toLowerCase().includes(word)) score += 3;
        if (text.includes(word)) score += 1;
    });

    return score;
}

/* ---------------- FILTER MATCH ---------------- */
function match(skill) {

    for (let key in ACTIVE) {
        const set = ACTIVE[key];
        if (set.size === 0) continue;

        let values = [];

        if (Array.isArray(skill[key])) values = skill[key];
        else values = [skill[key]];

        if (![...set].every(v => values.includes(v))) return false;
    }

    return true;
}

/* ---------------- RENDER ---------------- */
function render() {

    const query = document.getElementById("search").value;

    let data = ALL
        .filter(match)
        .map(s => ({...s, _score: score(s, query)}))
        .filter(s => s._score > 0)
        .sort((a,b) => b._score - a._score);

    const grid = document.getElementById("grid");

    grid.innerHTML = data.map(s => `
        <div class="card">

            <div class="title">${s.title}</div>

            <div class="summary">${s.summary}</div>

            <div class="meta">
                ${s.domain} | ${s.usage} | ${s.difficulty}
            </div>

            <div class="meta">
                ${(s.tech_stack || []).join(", ")}
            </div>

            <div class="meta">
                ${(s.languages || []).join(", ")}
            </div>

        </div>
    `).join("");
}

/* ---------------- EVENTS ---------------- */
document.getElementById("search")
    .addEventListener("input", render);

document.getElementById("file")
.addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const fd = new FormData();
    fd.append("file", file);

    const res = await fetch(`${API}/process-skill`, {
        method:"POST",
        body:fd
    });

    const skill = await res.json();

    ALL.unshift(skill);

    buildFilters();
    render();
});

/* INIT */
load();

</script>

</body>
</html>
