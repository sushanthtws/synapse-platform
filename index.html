<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: #f6f8fa;
    margin: 0;
}

/* HEADER */
.header {
    background: white;
    padding: 14px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 700;
    font-size: 18px;
    color: #0969da;
}

.upload-btn {
    background: #2da44e;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

/* SEARCH */
.search-bar {
    padding: 14px 20px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.search-bar input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* FILTERS */
.filters {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.filters select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
}

/* GRID */
.grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px,1fr));
    gap: 16px;
}

/* CARD */
.card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 16px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #0969da;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

.title {
    font-weight: 700;
    font-size: 15px;
    color: #0969da;
}

.summary {
    font-size: 13px;
    color: #57606a;
    margin: 8px 0;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 12px;
    background: #f0f6ff;
}

.meta {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">⚡ Synapse</div>

    <input type="file" id="fileInput" style="display:none">

    <button class="upload-btn"
        onclick="document.getElementById('fileInput').click()">
        + Upload Skill
    </button>
</div>

<!-- SEARCH -->
<div class="search-bar">
    <input id="searchBox" placeholder="🔍 Search skills (NLP enabled)">
</div>

<!-- FILTERS -->
<div class="filters">
    <select id="domainFilter"></select>
    <select id="usageFilter"></select>
    <select id="techFilter"></select>
    <select id="langFilter"></select>
    <select id="difficultyFilter"></select>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>

const API = "https://synapse-platform.onrender.com";

let SKILLS = [];

/* LOAD */
async function load() {
    const res = await fetch(`${API}/skills`);
    SKILLS = await res.json();
    buildFilters();
    render(SKILLS);
}

/* FILTER BUILD */
function buildFilters() {
    build("domainFilter","domain");
    build("usageFilter","usage");
    build("techFilter","tech");
    build("langFilter","language");
    build("difficultyFilter","difficulty");
}

function build(id, field) {
    const el = document.getElementById(id);
    const values = new Set();

    SKILLS.forEach(s => {
        (s[field] || []).forEach(v => values.add(v));
    });

    el.innerHTML =
        `<option value="">All ${field}</option>` +
        [...values].map(v => `<option>${v}</option>`).join('');
}

/* NLP SEARCH */
function score(skill, query) {
    let text = `
        ${skill.title}
        ${skill.summary}
        ${(skill.domain||[]).join(" ")}
        ${(skill.usage||[]).join(" ")}
        ${(skill.tech||[]).join(" ")}
        ${(skill.language||[]).join(" ")}
    `.toLowerCase();

    return query.split(" ").reduce((acc,q)=>
        acc + (text.includes(q)?1:0),0);
}

/* APPLY */
function apply() {

    let filtered = SKILLS;

    const q = document.getElementById("searchBox").value.toLowerCase();

    const domain = val("domainFilter");
    const usage = val("usageFilter");
    const tech = val("techFilter");
    const lang = val("langFilter");
    const diff = val("difficultyFilter");

    filtered = filtered.filter(s =>
        (!domain || s.domain?.includes(domain)) &&
        (!usage || s.usage?.includes(usage)) &&
        (!tech || s.tech?.includes(tech)) &&
        (!lang || s.language?.includes(lang)) &&
        (!diff || s.difficulty === diff)
    );

    if (q) {
        filtered = filtered
            .map(s => ({...s, _score: score(s,q)}))
            .sort((a,b)=>b._score-a._score);
    }

    render(filtered);
}

function val(id){
    return document.getElementById(id).value;
}

/* RENDER */
function render(list) {

    const grid = document.getElementById("grid");

    if (!list.length) {
        grid.innerHTML = "No skills found";
        return;
    }

    grid.innerHTML = list.map(s => `
        <div class="card">

            <div class="title">${s.title}</div>

            <div class="summary">${s.summary}</div>

            <div class="tags">
                ${(s.domain||[]).map(tag).join("")}
                ${(s.usage||[]).map(tag).join("")}
                ${(s.tech||[]).map(tag).join("")}
                ${(s.language||[]).map(tag).join("")}
            </div>

            <div class="meta">
                Difficulty: ${s.difficulty}
            </div>

        </div>
    `).join('');
}

function tag(t){
    return `<span class="tag">${t}</span>`;
}

/* UPLOAD */
document.getElementById("fileInput")
.addEventListener("change", async (e)=>{

    const file = e.target.files[0];
    if(!file) return;

    const form = new FormData();
    form.append("file", file);

    const res = await fetch(`${API}/process-skill`,{
        method:"POST",
        body:form
    });

    const skill = await res.json();

    SKILLS.unshift(skill);
    buildFilters();
    render(SKILLS);
});

/* EVENTS */
document.querySelectorAll("select")
    .forEach(el=>el.addEventListener("change",apply));

document.getElementById("searchBox")
    .addEventListener("input",apply);

/* INIT */
load();

</script>

</body>
</html>
