<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse Graph</title>
<link rel="stylesheet" href="style.css">

<style>
.graph {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.node {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    width: 260px;
    transition: 0.2s;
}

.node:hover {
    transform: scale(1.02);
    border-color: #0969da;
}

.node.active {
    border: 2px solid #0969da;
    box-shadow: 0 0 10px #0969da33;
}

.badge {
    font-size: 10px;
    background: #f0f7ff;
    padding: 2px 6px;
    border-radius: 8px;
    margin-right: 4px;
    display: inline-block;
}
</style>
</head>

<body>

<header class="header">
    <div class="header-content">
        <a href="#" class="logo">⚡ Synapse Graph</a>
    </div>
</header>

<main class="content-area">

    <div class="section-title">Skill Knowledge Graph</div>

    <input id="searchBox" class="search-input" placeholder="Search skills...">

    <div id="graph" class="graph"></div>

</main>

<script>

const API_BASE = "https://synapse-platform.onrender.com";

let SKILLS = [];
let selected = null;

/* ---------------- LOAD ---------------- */
async function load() {
    const res = await fetch(`${API_BASE}/skills`);
    SKILLS = await res.json();
    render(SKILLS);
}

/* ---------------- RELATION ENGINE ---------------- */
function related(a, b) {

    if (!a || !b) return false;

    return (
        a.skill_type === b.skill_type ||
        a.domain === b.domain ||
        overlap(a.tool_tags, b.tool_tags) ||
        overlap(a.tech_tags, b.tech_tags)
    );
}

function overlap(arr1 = [], arr2 = []) {
    return arr1.some(x => arr2.includes(x));
}

/* ---------------- RENDER ---------------- */
function render(list) {

    const graph = document.getElementById("graph");
    graph.innerHTML = "";

    list.forEach(s => {

        const node = document.createElement("div");
        node.className = "node";

        node.innerHTML = `
            <div><b>${s.title}</b></div>
            <div style="font-size:12px;color:#666;margin-top:6px;">
                ${s.summary}
            </div>

            <div style="margin-top:8px;">
                <span class="badge">${s.skill_type}</span>
                <span class="badge">${s.domain}</span>
            </div>
        `;

        node.onclick = () => highlight(s);

        graph.appendChild(node);
    });
}

/* ---------------- HIGHLIGHT RELATIONS ---------------- */
function highlight(skill) {

    selected = skill;

    document.querySelectorAll(".node").forEach((el, i) => {

        const other = SKILLS[i];

        if (other.title === skill.title) {
            el.classList.add("active");
        } else if (related(skill, other)) {
            el.classList.add("active");
        } else {
            el.classList.remove("active");
        }
    });
}

/* ---------------- SEARCH ---------------- */
document.getElementById("searchBox").addEventListener("input", (e) => {

    const q = e.target.value.toLowerCase();

    const filtered = SKILLS.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.summary.toLowerCase().includes(q) ||
        (s.intent_tags || []).join(" ").toLowerCase().includes(q)
    );

    render(filtered);
});

/* ---------------- INIT ---------------- */
load();

</script>

</body>
</html>
