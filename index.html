<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse Graph</title>
<link rel="stylesheet" href="style.css">

<style>
.header-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 15px;
}

.node {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    width: 260px;
    transition: 0.2s;
}

.node:hover {
    transform: scale(1.02);
    border-color: #0969da;
}

.node.active {
    border: 2px solid #0969da;
    box-shadow: 0 0 10px #0969da33;
}

.graph {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.upload-btn {
    padding: 8px 12px;
    background: #0969da;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.badge {
    font-size: 10px;
    background: #f0f7ff;
    padding: 2px 6px;
    border-radius: 8px;
    margin-right: 4px;
    display: inline-block;
}
</style>
</head>

<body>

<header class="header">
    <div class="header-content">
        <a class="logo">⚡ Synapse Graph</a>
    </div>
</header>

<main class="content-area">

    <!-- RESTORED HEADER CONTROLS -->
    <div class="header-bar">

        <input type="file" id="skillFile" accept=".md" style="display:none">

        <button class="upload-btn"
                onclick="document.getElementById('skillFile').click()">
            + Upload Skill
        </button>

        <input id="searchBox" class="search-input" placeholder="Search skills...">

    </div>

    <div id="graph" class="graph"></div>

</main>

<script>

const API_BASE = "https://synapse-platform.onrender.com";

let SKILLS = [];

/* ---------------- LOAD ---------------- */
async function load() {
    const res = await fetch(`${API_BASE}/skills`);
    SKILLS = await res.json();
    render(SKILLS);
}

/* ---------------- UPLOAD ---------------- */
document.getElementById("skillFile")
.addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const fd = new FormData();
    fd.append("file", file);

    const res = await fetch(`${API_BASE}/process-skill`, {
        method: "POST",
        body: fd
    });

    const skill = await res.json();

    SKILLS.unshift(skill);
    render(SKILLS);
});

/* ---------------- RENDER ---------------- */
function render(list) {

    const graph = document.getElementById("graph");
    graph.innerHTML = "";

    list.forEach(s => {

        const node = document.createElement("div");
        node.className = "node";

        node.innerHTML = `
            <div><b>${s.title}</b></div>
            <div style="font-size:12px;color:#666;margin-top:6px;">
                ${s.summary}
            </div>

            <div style="margin-top:8px;">
                <span class="badge">${s.skill_type}</span>
                <span class="badge">${s.domain}</span>
            </div>
        `;

        graph.appendChild(node);
    });
}

/* ---------------- SEARCH ---------------- */
document.getElementById("searchBox").addEventListener("input", (e) => {

    const q = e.target.value.toLowerCase();

    const filtered = SKILLS.filter(s =>
        (s.title || "").toLowerCase().includes(q) ||
        (s.summary || "").toLowerCase().includes(q)
    );

    render(filtered);
});

/* ---------------- INIT ---------------- */
load();

</script>

</body>
</html>
