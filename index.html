<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: #f6f8fa;
    margin: 0;
}

/* HEADER */
.header {
    background: white;
    padding: 12px 20px;
    border-bottom: 1px solid #ddd;
    font-weight: 700;
}

/* FILTER BAR */
.filter-bar {
    background: white;
    padding: 12px;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

select, input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* GRID */
.grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px,1fr));
    gap: 16px;
}

/* CARD */
.card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #0969da;
}

.title {
    font-weight: 700;
    color: #0969da;
}

.summary {
    font-size: 13px;
    color: #57606a;
    margin: 8px 0;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    background: #f0f6ff;
}

.meta {
    font-size: 11px;
    color: #666;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">⚡ Synapse Skills</div>

<!-- FILTER BAR -->
<div class="filter-bar">

    <input id="searchBox" placeholder="🔍 Search skills (NLP enabled)">

    <select id="domainFilter"></select>
    <select id="usageFilter"></select>
    <select id="techFilter"></select>
    <select id="langFilter"></select>
    <select id="difficultyFilter"></select>

</div>

<div class="grid" id="grid"></div>

<script>

const API = "https://synapse-platform.onrender.com";

let SKILLS = [];

/* ---------------- LOAD ---------------- */
async function load() {
    const res = await fetch(`${API}/skills`);
    SKILLS = await res.json();

    buildFilters();
    render(SKILLS);
}

/* ---------------- BUILD FILTERS ---------------- */
function buildFilters() {

    build("domainFilter", "domain");
    build("usageFilter", "usage");
    build("techFilter", "tech");
    build("langFilter", "language");
    build("difficultyFilter", "difficulty");
}

function build(id, field) {
    const el = document.getElementById(id);

    const values = new Set();

    SKILLS.forEach(s => {
        (s[field] || []).forEach(v => values.add(v));
    });

    el.innerHTML = `<option value="">All ${field}</option>` +
        [...values].map(v => `<option>${v}</option>`).join('');
}

/* ---------------- NLP SEARCH ---------------- */
function score(skill, query) {

    query = query.toLowerCase();

    let text = `
        ${skill.title}
        ${skill.summary}
        ${(skill.domain||[]).join(" ")}
        ${(skill.usage||[]).join(" ")}
        ${(skill.tech||[]).join(" ")}
        ${(skill.language||[]).join(" ")}
    `.toLowerCase();

    let score = 0;

    query.split(" ").forEach(q => {
        if (text.includes(q)) score++;
    });

    return score;
}

/* ---------------- FILTER ---------------- */
function apply() {

    let filtered = SKILLS;

    const q = document.getElementById("searchBox").value;

    const domain = val("domainFilter");
    const usage = val("usageFilter");
    const tech = val("techFilter");
    const lang = val("langFilter");
    const diff = val("difficultyFilter");

    filtered = filtered.filter(s =>
        (!domain || s.domain?.includes(domain)) &&
        (!usage || s.usage?.includes(usage)) &&
        (!tech || s.tech?.includes(tech)) &&
        (!lang || s.language?.includes(lang)) &&
        (!diff || s.difficulty === diff)
    );

    if (q) {
        filtered = filtered
            .map(s => ({...s, _score: score(s,q)}))
            .sort((a,b) => b._score - a._score);
    }

    render(filtered);
}

function val(id) {
    return document.getElementById(id).value;
}

/* ---------------- RENDER ---------------- */
function render(list) {

    const grid = document.getElementById("grid");

    if (!list.length) {
        grid.innerHTML = "No skills found";
        return;
    }

    grid.innerHTML = list.map(s => `
        <div class="card">

            <div class="title">${s.title}</div>

            <div class="summary">${s.summary}</div>

            <div class="tags">
                ${(s.domain||[]).map(t=>tag(t)).join("")}
                ${(s.usage||[]).map(t=>tag(t)).join("")}
                ${(s.tech||[]).map(t=>tag(t)).join("")}
                ${(s.language||[]).map(t=>tag(t)).join("")}
            </div>

            <div class="meta">
                Difficulty: ${s.difficulty}
            </div>

        </div>
    `).join('');
}

function tag(t) {
    return `<span class="tag">${t}</span>`;
}

/* ---------------- EVENTS ---------------- */
document.querySelectorAll("select,input")
    .forEach(el => el.addEventListener("change", apply));

document.getElementById("searchBox")
    .addEventListener("input", apply);

/* ---------------- INIT ---------------- */
load();

</script>

</body>
</html>
