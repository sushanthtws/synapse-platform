<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synapse - Knowledge Platform</title>
<link rel="stylesheet" href="style.css">

<style>
/* ---------------- TOP BAR ---------------- */
.top-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
}

.search-input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

.filter {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
}

/* ---------------- CARD ENHANCEMENTS ---------------- */
.card-points {
    margin: 10px 0;
    padding-left: 18px;
    color: #57606a;
    font-size: 13px;
}

.card-points li {
    margin-bottom: 4px;
}
</style>
</head>

<body>

<header class="header">
    <div class="header-content">
        <a href="index.html" class="logo">⚡ Synapse</a>
        <nav class="nav-tabs">
            <a href="#" class="nav-tab active">Explore & Ingest</a>
        </nav>
    </div>
</header>

<div class="main-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-section">
            <div class="sidebar-section-title">📤 Ingest Skill</div>

            <input type="file" id="skillFile" accept=".md" style="display:none">

            <button class="sidebar-apply-btn"
                onclick="document.getElementById('skillFile').click()">
                + Upload Skill.md
            </button>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">📁 Industry</div>
            <div style="font-size: 13px; color: var(--color-text-secondary);">
                Real Estate (Default)
            </div>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="content-area">

        <div class="section-title">🥇 Skill Knowledge Grid</div>

        <!-- TOP BAR (SEARCH + FILTER) -->
        <div class="top-bar">
            <input id="searchBox"
                   class="search-input"
                   placeholder="Search skills...">

            <select id="difficultyFilter" class="filter">
                <option value="all">All Levels</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <!-- GRID -->
        <div class="project-grid" id="projectGrid"></div>

    </main>

</div>

<script>

/* ---------------- CONFIG ---------------- */
const API_BASE = "https://synapse-platform.onrender.com";

/* ---------------- STATE ---------------- */
let ALL_SKILLS = [];
const grid = document.getElementById("projectGrid");

/* ---------------- SAFE TEXT ---------------- */
function safe(text) {
    return String(text || "")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("`", "'");
}

/* ---------------- LOAD SKILLS ---------------- */
async function loadSkills() {
    try {
        const res = await fetch(`${API_BASE}/skills`);
        ALL_SKILLS = await res.json();
        renderAll(ALL_SKILLS);
    } catch (err) {
        console.error("Failed to load skills:", err);
    }
}

/* ---------------- RENDER ALL ---------------- */
function renderAll(skills) {
    grid.innerHTML = "";
    skills.forEach(renderCard);
}

/* ---------------- FILTER ENGINE ---------------- */
function applyFilters() {

    const query = document.getElementById("searchBox").value.toLowerCase();
    const difficulty = document.getElementById("difficultyFilter").value;

    let filtered = ALL_SKILLS;

    if (difficulty !== "all") {
        filtered = filtered.filter(s => s.difficulty === difficulty);
    }

    if (query) {
        filtered = filtered.filter(s =>
            (s.title || "").toLowerCase().includes(query) ||
            (s.description || "").toLowerCase().includes(query) ||
            (s.tags || []).join(" ").toLowerCase().includes(query)
        );
    }

    renderAll(filtered);
}

/* ---------------- UPLOAD ---------------- */
document.getElementById("skillFile")
.addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch(`${API_BASE}/process-skill`, {
            method: "POST",
            body: formData
        });

        const skill = await res.json();

        ALL_SKILLS.unshift(skill);
        renderAll(ALL_SKILLS);

    } catch (err) {
        console.error(err);
        alert("Upload failed");
    }
});

/* ---------------- CARD RENDER ---------------- */
function renderCard(skill) {

    const tags = (skill.tags || [])
        .slice(0, 5)
        .map(t => `<span class="tag">${safe(t)}</span>`)
        .join('');

    const points = (skill.key_points || [])
        .slice(0, 4)
        .map(p => `<li>${safe(p)}</li>`)
        .join('');

    const cardHtml = `
        <div class="project-card">

            <div class="rank-badge">
                ${safe(skill.difficulty || "medium")}
            </div>

            <div class="card-header">
                <div class="card-icon">📄</div>

                <div class="card-header-text">
                    <div class="card-name">
                        ${safe(skill.title)}
                    </div>
                </div>
            </div>

            <div class="card-desc">
                ${safe(skill.description)}
            </div>

            <ul class="card-points">
                ${points}
            </ul>

            <div class="card-tags">
                ${tags}
            </div>

            <div class="card-footer">
                <button class="btn-secondary"
                    onclick="downloadMD('${safe(skill.title)}', \`${skill.raw_content || ""}\`)">
                    Download MD
                </button>
            </div>

        </div>
    `;

    grid.insertAdjacentHTML("afterbegin", cardHtml);
}

/* ---------------- DOWNLOAD ---------------- */
function downloadMD(name, content) {
    const blob = new Blob([content], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `${name}.md`;
    a.click();
}

/* ---------------- EVENTS ---------------- */
document.getElementById("searchBox")
    .addEventListener("input", applyFilters);

document.getElementById("difficultyFilter")
    .addEventListener("change", applyFilters);

/* ---------------- INIT ---------------- */
loadSkills();

</script>

</body>
</html>
